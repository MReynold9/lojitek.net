name: Build Lojitek APK

on:
  push:
    branches: [android-apk]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Setup project
        run: |
          mkdir -p www
          echo '<html><body>Lojitek</body></html>' > www/index.html
          printf '{\n  "appId": "net.lojitek.app",\n  "appName": "Lojitek",\n  "webDir": "www",\n  "server": {"url": "https://lojitek.net", "cleartext": true},\n  "android": {"allowMixedContent": true, "backgroundColor": "#0f172a"}\n}' > capacitor.config.json

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: npx cap add android

      - name: Force app name Lojitek
        run: |
          STRINGS=android/app/src/main/res/values/strings.xml
          sed -i 's|<string name="app_name">.*</string>|<string name="app_name">Lojitek</string>|g' $STRINGS
          echo '--- strings.xml ---'
          cat $STRINGS

      - name: Fix Kotlin duplicate class conflict
        run: |
          cat >> android/build.gradle << 'EOF'
          subprojects {
            configurations.all {
              resolutionStrategy {
                force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
              }
            }
          }
          EOF

      - name: Register ThermalPrint plugin
        run: |
          PKGDIR=android/app/src/main/java/net/lojitek/app
          mkdir -p $PKGDIR
          cp ThermalPrintPlugin.java $PKGDIR/
          sed -i 's|package net.lojitek.lotri|package net.lojitek.app|g' $PKGDIR/ThermalPrintPlugin.java
          printf 'package net.lojitek.app;\nimport android.os.Bundle;\nimport com.getcapacitor.BridgeActivity;\npublic class MainActivity extends BridgeActivity {\n  @Override public void onCreate(Bundle s) {\n    registerPlugin(ThermalPrintPlugin.class);\n    super.onCreate(s);\n  }\n}' > $PKGDIR/MainActivity.java

      - name: Sync and Build APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lojitek-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30