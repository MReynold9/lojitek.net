name: Build Lotri APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npx vite build --outDir dist/public
        env:
          NODE_ENV: production

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: npx cap add android

      - name: Install Pillow
        run: pip3 install Pillow

      - name: Set app icon (square, full-frame, dark navy)
        run: python3 set_icon.py

      - name: Copy native print plugin
        run: |
          cp android-plugin/ThermalPrintPlugin.java \
            android/app/src/main/java/net/lojitek/lotri/ThermalPrintPlugin.java

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lotri-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
