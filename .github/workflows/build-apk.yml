name: Build Lojitek APK

on:
  push:
    branches: [android-apk]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Setup project
        run: |
          mkdir -p www
          echo '<html><body>Lojitek</body></html>' > www/index.html
          printf '{"appId":"net.lojitek.app","appName":"Lojitek","webDir":"www","server":{"url":"https://lojitek.net","cleartext":true},"android":{"allowMixedContent":true}}' > capacitor.config.json

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: npx cap add android

      - name: Set Lojitek logo as app icon
        run: |
          pip install Pillow --quiet
          python3 set_icon.py

      - name: Remove adaptive icon XMLs so PNG icons are used
        run: |
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          rm -f android/app/src/main/res/drawable/ic_launcher_background.xml
          rm -f android/app/src/main/res/drawable-v24/ic_launcher_foreground.xml
          echo 'Adaptive icon XMLs removed'

      - name: Force app name and network config
        run: |
          sed -i 's|<string name="app_name">.*</string>|<string name="app_name">Lojitek</string>|g' android/app/src/main/res/values/strings.xml
          mkdir -p android/app/src/main/res/xml
          printf '<?xml version="1.0" encoding="utf-8"?><network-security-config><base-config cleartextTrafficPermitted="true"><trust-anchors><certificates src="system"/><certificates src="user"/></trust-anchors></base-config></network-security-config>' > android/app/src/main/res/xml/network_security_config.xml
          sed -i 's|android:label="@string/app_name"|android:label="@string/app_name" android:usesCleartextTraffic="true" android:networkSecurityConfig="@xml/network_security_config"|g' android/app/src/main/AndroidManifest.xml

      - name: Fix Kotlin conflict
        run: |
          echo "subprojects { configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'; force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'; force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22' } } }" >> android/build.gradle

      - name: Register ThermalPrint plugin
        run: |
          PKGDIR=android/app/src/main/java/net/lojitek/app
          mkdir -p $PKGDIR
          cp ThermalPrintPlugin.java $PKGDIR/
          sed -i 's|package net.lojitek.lotri|package net.lojitek.app|g' $PKGDIR/ThermalPrintPlugin.java
          printf 'package net.lojitek.app;\nimport android.os.Bundle;\nimport com.getcapacitor.BridgeActivity;\npublic class MainActivity extends BridgeActivity {\n  @Override public void onCreate(Bundle s) {\n    registerPlugin(ThermalPrintPlugin.class);\n    super.onCreate(s);\n  }\n}' > $PKGDIR/MainActivity.java

      - name: Sync and Build APK
        run: |
          npx cap sync android
          cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lojitek-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
