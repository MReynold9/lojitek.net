name: Build Lojitek APK

on:
  push:
    branches: [android-apk]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Create Capacitor config
        run: |
          mkdir -p www
          echo "<html><body></body></html>" > www/index.html
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "net.lojitek.lotri",
            "appName": "Lojitek",
            "webDir": "www",
            "server": {
              "url": "https://lojitek.net",
              "cleartext": true
            },
            "android": {
              "allowMixedContent": true,
              "backgroundColor": "#0f172a"
            }
          }
          EOF

      - name: Add Android platform
        run: rm -rf android && npx cap add android

      - name: Fix Kotlin stdlib conflict
        run: |
          echo "kotlin.stdlib.default.dependency=false" >> android/gradle.properties
          python3 << 'PYEOF'
          with open('android/build.gradle', 'r') as f:
              content = f.read()
          patch = """
          subprojects {
              configurations.all {
                  resolutionStrategy.eachDependency { details ->
                      if (details.requested.group == 'org.jetbrains.kotlin') {
                          details.useVersion '1.9.0'
                          details.because 'Align all Kotlin stdlib versions'
                      }
                  }
              }
          }
          """
          with open('android/build.gradle', 'a') as f:
              f.write(patch)
          print("Patched build.gradle OK")
          PYEOF

      - name: Install Pillow
        run: pip3 install Pillow

      - name: Scale up icon to fill space
        run: |
          python3 << 'PYEOF'
          from PIL import Image

          img = Image.open("lojitek-icon-source.png").convert("RGBA")
          w, h = img.size

          # Crop 8% margin each side to zoom in - same colors, just bigger
          margin_x = int(w * 0.08)
          margin_y = int(h * 0.08)
          img = img.crop((margin_x, margin_y, w - margin_x, h - margin_y))
          img = img.resize((1024, 1024), Image.LANCZOS)
          img.save("lojitek-icon-source.png")
          print("Icon scaled up - same colors, just bigger")
          PYEOF

      - name: Set app icon
        run: |
          python3 set_icon.py
          python3 << 'PYEOF'
          from PIL import Image
          import os
      - name: Add Lojitek logo
        run: |
          if [ -f assets/logo.png ]; then
            cp assets/logo.png lojitek-icon-source.png
          else
            echo "Logo pa jwenn!"
            exit 1
          fi

          adaptive_targets = {
              "android/app/src/main/res/mipmap-mdpi/ic_launcher_foreground.png": 108,
              "android/app/src/main/res/mipmap-hdpi/ic_launcher_foreground.png": 162,
              "android/app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.png": 216,
              "android/app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.png": 324,
              "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.png": 432,
          }

          for path, size in adaptive_targets.items():
              os.makedirs(os.path.dirname(path), exist_ok=True)
              img = src.resize((size, size), Image.LANCZOS)
              img.save(path, "PNG")
              print(f"  OK {path}")

          for xml_path in [
              "android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml",
              "android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml",
          ]:
              if os.path.exists(xml_path):
                  os.remove(xml_path)
                  print(f"  Removed {xml_path}")
          PYEOF

      - name: Fix app label in AndroidManifest
        run: |
          sed -i 's/android:label="[^"]*"/android:label="Lojitek"/g' \
            android/app/src/main/AndroidManifest.xml

      - name: Copy thermal print plugin
        run: |
          cp android-plugin/ThermalPrintPlugin.java \
            android/app/src/main/java/net/lojitek/lotri/ThermalPrintPlugin.java || true

      - name: Add Bluetooth permissions
        run: |
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.BLUETOOTH" />\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />|' android/app/src/main/AndroidManifest.xml

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lojitek-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
