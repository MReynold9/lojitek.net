name: Build Lojitek APK

on:
  push:
    branches: [android-apk]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Node + Java
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      # Install Capacitor
      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/cli @capacitor/core @capacitor/android

      # Prepare web app (PA METE BLANK PAGE ANKO!)
      - name: Prepare web files
        run: |
          mkdir -p www
          cp -r ./* www/ || true

      # Capacitor config (SAN URL EXTÈN)
      - name: Create config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "net.lojitek.lotri",
            "appName": "Lojitek",
            "webDir": "www",
            "android": {
              "backgroundColor": "#0f172a"
            }
          }
          EOF

      # Add Android
      - name: Add Android
        run: |
          rm -rf android
          npx cap add android

      # Sync
      - name: Sync
        run: npx cap sync android

      # Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lojitek-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
