name: Build Lojitek APK

on:
  push:
    branches: [android-apk]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npx vite build --outDir dist/public
        env:
          NODE_ENV: production

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Regenerate Android project
        run: rm -rf android && npx cap add android

      - name: Install Pillow
        run: pip3 install Pillow

      - name: Set app icon
        run: python3 set_icon.py

      - name: Copy thermal print plugin
        run: |
          cp android-plugin/ThermalPrintPlugin.java \
            android/app/src/main/java/net/lojitek/lotri/ThermalPrintPlugin.java

      - name: Add Bluetooth permissions
        run: |
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.BLUETOOTH" />\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />|' android/app/src/main/AndroidManifest.xml

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lotri-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
