name: Build Lotri APK

on:
  push:
    branches: [android-apk]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Setup project
        run: |
          mkdir -p www
          echo '<html><body>Lotri</body></html>' > www/index.html
          printf '{\n  "appId": "net.lojitek.lotri",\n  "appName": "Lotri",\n  "webDir": "www",\n  "server": {"url": "https://lojitek.net", "cleartext": true},\n  "android": {"allowMixedContent": true, "backgroundColor": "#0f172a"}\n}' > capacitor.config.json

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: npx cap add android

      - name: Register ThermalPrint plugin
        run: |
          PKGDIR=android/app/src/main/java/net/lojitek/lotri
          mkdir -p $PKGDIR
          cp ThermalPrintPlugin.java $PKGDIR/
          printf 'package net.lojitek.lotri;\nimport android.os.Bundle;\nimport com.getcapacitor.BridgeActivity;\npublic class MainActivity extends BridgeActivity {\n  @Override public void onCreate(Bundle s) {\n    registerPlugin(ThermalPrintPlugin.class);\n    super.onCreate(s);\n  }\n}' > $PKGDIR/MainActivity.java

      - name: Sync and Build APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lotri-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30