name: Build Lojitek APK

on:
  push:
    branches: [android-apk]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Build web app
        run: npx vite build --outDir dist/public
        env:
          NODE_ENV: production

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - run: npx cap add android

      - name: Install Pillow
        run: pip3 install Pillow

      - name: Set app icon
        run: python3 set_icon.py

      - name: Copy print plugin
        run: |
          cp android-plugin/ThermalPrintPlugin.java \
            android/app/src/main/java/net/lojitek/lotri/ThermalPrintPlugin.java

      - run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: Lotri-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
